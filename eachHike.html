<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        /* Add CSS styles for the card container with vertical scrolling */
        .card-container {
            max-height: 500px;
            /* Adjust the maximum height as needed */
            overflow-y: auto;
        }

        /* Style the individual cards as needed */
        .card {
            width: 80%;
            /* Adjust the width as per your design, leaving a little space for margins */
            margin: 1%;
            /* Add margin between cards */
        }
    </style>
    
    <!-- Web Components for shared navbar and footer layout -->
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
</head>

<body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- our own navbar goes here -->
    <site-navbar></site-navbar>


    <!-- Main content goes here -->

    <main class="container py-4">
        <h1 id="hikeName" style="margin-left: 10%;">Loading...</h1>

        <div class="position-relative d-block mt-3 mx-auto">
            <img id="hikeImage" class="img-fluid rounded d-block mx-auto" src="" alt="Hike image">
            <button id="writeReviewBtn"
                class="btn btn-primary position-absolute bottom-0 start-50 translate-middle-x mb-3">
                Write Review
            </button>
        </div>

        <br>
        <div class="card-container border rounded border-dark">
            <h2 style="margin-left: 10%;">Reviews:</h2>
            <div id="details-go-here"></div>

            <!-- Vertical stack container -->
            <div id="reviewCardGroup" class="d-flex flex-column gap-3">
                <!-- cards will be appended here -->
            </div>
        </div>

        <template id="reviewCardTemplate">
            <div class="card bg-secondary mx-auto review-card">
                <div class="card-body bg-light py-2 px-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <h6 class="title mb-1">placeholder</h6>
                        <small class="time text-muted">placeholder</small>
                    </div>

                    <div class="star-rating small mb-2"></div>

                    <!-- Organized details in 2 columns -->
                    <div class="row g-1 small">
                        <div class="col-6"><span class="fw-semibold">Level:</span> <span
                                class="level">placeholder</span>
                        </div>
                        <div class="col-6"><span class="fw-semibold">Season:</span> <span
                                class="season">placeholder</span>
                        </div>
                        <div class="col-6"><span class="fw-semibold">Scrambled:</span> <span
                                class="scrambled">placeholder</span></div>
                        <div class="col-6"><span class="fw-semibold">Flooded:</span> <span
                                class="flooded">placeholder</span></div>
                    </div>

                    <hr class="my-2">

                    <p class="description small mb-0">placeholder</p>
                </div>
            </div>
        </template>
    </main>




    <!-- our own footer goes here -->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/eachHike.js"></script>

</body>

</html>
